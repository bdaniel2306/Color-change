<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Full Screen Color Timer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Mono', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color 0.4s ease;
      overflow: hidden;
      background-color: #f0ede8;
    }

    #inputBox {
      background: white;
      padding: 36px 40px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 6px 32px rgba(0,0,0,0.12);
      width: 600px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    #inputBox h2 {
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #111;
    }

    #colorChoices {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .colorBtn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .colorBtn:hover { transform: scale(1.1); }

    .colorBtn.selected {
      border-color: #111;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.15);
      transform: scale(0.88);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }

    .control-group label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .range-row span {
      font-size: 12px;
      color: #111;
      min-width: 28px;
      text-align: right;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #ddd;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #111;
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .time-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .time-row label {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
      flex: 1;
      text-align: left;
    }

    #timeInput {
      width: 64px;
      padding: 6px 10px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }

    #timeInput:focus { border-color: #111; }

    #startStopBtn {
      position: fixed;
      bottom: 450px;
      padding: 60px 80px;
      font-family: 'DM Mono', monospace;
      font-size: 50px;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      color: white;
      background-color: #1a9e5c;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: background-color 0.3s, transform 0.15s;
    }

    #startStopBtn:hover { transform: scale(1.04); }
    #startStopBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    #timerDisplay {
      position: fixed;
      top: 28px;
      font-size: 32px;
      font-weight: 500;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      letter-spacing: 0.05em;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>

  <div id="inputBox">
    <h2>Color Timer</h2>

    <div id="colorChoices">
      <button class="colorBtn" data-color="red"    style="background:#e53935"></button>
      <button class="colorBtn" data-color="blue"   style="background:#1e88e5"></button>
      <button class="colorBtn" data-color="green"  style="background:#43a047"></button>
      <button class="colorBtn" data-color="yellow" style="background:#fdd835"></button>
      <button class="colorBtn" data-color="purple" style="background:#8e24aa"></button>
    </div>

    <hr class="divider">

    <div class="controls">

      <div class="control-group">
        <label>Color display duration (sec)</label>
        <div class="range-row">
          <span id="colorMinVal">2</span>
          <input type="range" id="colorMin" min="1" max="15" value="2">
          <span>–</span>
          <input type="range" id="colorMax" min="1" max="15" value="5">
          <span id="colorMaxVal">5</span>
        </div>
      </div>

      <div class="control-group">
        <label>Black gap duration (sec)</label>
        <div class="range-row">
          <span id="blackMinVal">1</span>
          <input type="range" id="blackMin" min="0" max="10" value="1">
          <span>–</span>
          <input type="range" id="blackMax" min="0" max="10" value="3">
          <span id="blackMaxVal">3</span>
        </div>
      </div>

    </div>

    <hr class="divider">

    <div class="time-row">
      <label>Total time limit (sec)</label>
      <input id="timeInput" type="number" value="20" min="1">
    </div>
  </div>

  <button id="startStopBtn" onclick="toggleGame()">Start</button>
  <div id="timerDisplay"></div>

  <script>
    const COLOR_HEX = {
      red:    '#e53935',
      blue:   '#1e88e5',
      green:  '#43a047',
      yellow: '#fdd835',
      purple: '#8e24aa',
    };

    let selectedColors = [];
    let timeLeft = 0;
    let timerInterval = null;
    let colorTimeout = null;
    let gameRunning = false;

    // ── Color buttons ──────────────────────────────────────────────
    document.querySelectorAll('.colorBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const color = btn.dataset.color;
        if (selectedColors.includes(color)) {
          selectedColors = selectedColors.filter(c => c !== color);
          btn.classList.remove('selected');
        } else {
          selectedColors.push(color);
          btn.classList.add('selected');
        }
      });
    });

    // ── Slider coupling (min ≤ max) ────────────────────────────────
    function linkSliders(minId, maxId, minLabelId, maxLabelId) {
      const minEl = document.getElementById(minId);
      const maxEl = document.getElementById(maxId);
      const minLbl = document.getElementById(minLabelId);
      const maxLbl = document.getElementById(maxLabelId);

      const update = () => {
        if (+minEl.value > +maxEl.value) maxEl.value = minEl.value;
        if (+maxEl.value < +minEl.value) minEl.value = maxEl.value;
        minLbl.textContent = minEl.value;
        maxLbl.textContent = maxEl.value;
      };

      minEl.addEventListener('input', update);
      maxEl.addEventListener('input', update);
    }

    linkSliders('colorMin', 'colorMax', 'colorMinVal', 'colorMaxVal');
    linkSliders('blackMin', 'blackMax', 'blackMinVal', 'blackMaxVal');

    function toHex(colorName) {
      return COLOR_HEX[colorName] || colorName;
    }



    // ── Helpers ────────────────────────────────────────────────────
    function randBetween(minId, maxId) {
      const lo = +document.getElementById(minId).value;
      const hi = +document.getElementById(maxId).value;
      return (lo + Math.random() * (hi - lo)) * 1000;
    }

    const inputBox     = document.getElementById("inputBox");
    const timerDisplay = document.getElementById("timerDisplay");
    const startStopBtn = document.getElementById("startStopBtn");

    // ── Game flow ──────────────────────────────────────────────────
    function toggleGame() {
      gameRunning ? stopGame() : preGameCountdown();
    }

    function preGameCountdown() {
      if (selectedColors.length === 0) { alert("Please select at least one color!"); return; }
      const t = parseInt(document.getElementById("timeInput").value);
      if (isNaN(t) || t <= 0) { alert("Enter a valid time!"); return; }

      let countdown = 3;
      inputBox.style.display = "none";
      startStopBtn.disabled = true;
      timerDisplay.textContent = countdown;

      const iv = setInterval(() => {
        countdown--;
        if (countdown > 0) {
          timerDisplay.textContent = countdown;
        } else {
          clearInterval(iv);
          timerDisplay.textContent = "";
          startGame();
        }
      }, 1000);
    }

    function startGame() {
      timeLeft = parseInt(document.getElementById("timeInput").value);

      startStopBtn.disabled = false;
      startStopBtn.textContent = "Stop";
      startStopBtn.style.backgroundColor = "#e53935";
      gameRunning = true;

      timerDisplay.textContent = `${timeLeft}s`;
      timerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = `${timeLeft}s`;
        if (timeLeft <= 0) {
          stopGame();
          document.body.style.backgroundColor = "#f0ede8";
          timerDisplay.textContent = "Done!";
        }
      }, 1000);

      showNextColor();
    }

    function stopGame() {
      clearInterval(timerInterval);
      clearTimeout(colorTimeout);
      gameRunning = false;
      inputBox.style.display = "flex";
      startStopBtn.textContent = "Start";
      startStopBtn.style.backgroundColor = "#1a9e5c";
      document.body.style.backgroundColor = "#f0ede8";
      timerDisplay.textContent = "";
    }

    function showNextColor() {
      if (!gameRunning || timeLeft <= 0) return;

      const color = selectedColors[Math.floor(Math.random() * selectedColors.length)];
      document.body.style.backgroundColor = toHex(color);

      const colorDuration = randBetween('colorMin', 'colorMax');

      colorTimeout = setTimeout(() => {
        document.body.style.backgroundColor = "black";

        const blackDuration = randBetween('blackMin', 'blackMax');
        colorTimeout = setTimeout(showNextColor, blackDuration);
      }, colorDuration);
    }
  </script>
</body>
</html>
